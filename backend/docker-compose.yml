services:
  postgres:
    image: postgres:16-alpine
    container_name: nips-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nips_live
      POSTGRES_USER: nips_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_PASSWORD}
    volumes:
      - nips_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nips_user -d nips_live"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build: .
    container_name: nips-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
volumes:
  nips_postgres_data:
